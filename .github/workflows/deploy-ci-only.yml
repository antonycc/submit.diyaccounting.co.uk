# .github/workflows/deploy-ci-only.yml

name: deploy-ci-only
concurrency: deploy-ci
run-name: "deploy ci only [${{ github.ref_name }}] (skipDeploy = [${{ inputs.skipDeploy || 'false' }}])"

on:
  push:
    branches:
      - '**'
      - '!main'
      - '!gh_pages'
    paths:
      - 'infra/**'
      - 'app/**'
      - 'web/**'
      - 'cdk.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-ci-only.yml'
      - '**/pom.xml'
  workflow_call:
    inputs:
      skipDeploy:
        description: 'Skip deployment step'
        type: string
        required: false
        default: 'false'
      selfHosted: # added
        description: 'Use self-hosted runner'
        type: string
        required: false
        default: 'false'
    secrets:
      HMRC_CLIENT_SECRET:
        required: true
      DIY_SUBMIT_GOOGLE_CLIENT_SECRET:
        required: true
  workflow_dispatch:
    inputs:
      skipDeploy:
        description: 'Skip deployment step'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      selfHosted: # added
        description: 'Use self-hosted runner'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  #schedule:
  #  - cron: '14 2,8,14,20 * * *'

env:
  skipDeploy: ${{ inputs.skipDeploy || 'false' }}
  selfHosted: ${{ inputs.selfHosted || 'false' }} # added
  RUNS_ON_UBUNTU: '["ubuntu-latest"]' # added
  RUNS_ON_HOSTED: '["self-hosted","submit","ec2"]' # added
  runsOn: ${{ env.selfHosted == 'true' && env.RUNS_ON_HOSTED || env.RUNS_ON_UBUNTU }} # added
  RUNNER_ASG: ${{ vars.RUNNER_ASG || 'submit-selfhosted-runner-asg' }} # added

jobs:

  provision-runner: # added
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        if: env.selfHosted == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_RUNNER_ADMIN_ROLE_ARN }}
          role-chaining: false
          aws-region: eu-west-2
          audience: sts.amazonaws.com
          role-skip-session-tagging: true
          output-credentials: true
          retry-max-attempts: 3
      - name: Scale ASG to 1 and wait for runner
        if: env.selfHosted == 'true'
        shell: bash
        env:
          RUNNER_ASG: ${{ env.RUNNER_ASG }}
          GH_TOKEN: ${{ secrets.GH_REPO_TOKEN_FOR_API }}
        run: |
          set -euo pipefail
          aws autoscaling set-desired-capacity --auto-scaling-group-name "$RUNNER_ASG" --desired-capacity 1
          echo "Waiting for self-hosted runner to register..."
          for i in {1..60}; do
            online=$(gh api repos/${{ github.repository }}/actions/runners --jq '.runners[] | select(.status=="online") | select([.labels[].name] | index("submit")) | .name' | wc -l || true)
            if [ "${online:-0}" -ge 1 ]; then echo "Runner online"; exit 0; fi
            sleep 10
          done
          echo "Runner did not come online in time" >&2
          exit 1

  build-base-image:
    uses: ./.github/workflows/∞-reusable-build-base-image.yml

  upsert-secrets:
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        if: ${{ env.skipDeploy != 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::887764105431:role/submit-github-actions-role
          role-chaining: false
          aws-region: eu-west-2
          audience: sts.amazonaws.com
          role-skip-session-tagging: true
          output-credentials: true
          retry-max-attempts: 3

      - name: Configure AWS Credentials
        if: ${{ env.skipDeploy != 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::887764105431:role/submit-deployment-role
          role-chaining: true
          aws-region: eu-west-2
          audience: sts.amazonaws.com
          role-skip-session-tagging: true
          output-credentials: true
          retry-max-attempts: 3

      - name: Write GitHub secret HMRC_CLIENT_SECRET to temp file (keeps out of logs)
        shell: bash
        env:
          GH_SECRET: ${{ secrets.HMRC_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          umask 077
          printf '%s' "$GH_SECRET" > secret.txt
          echo "::add-mask::$(cat secret.txt)"

      - name: Upsert HMRC_CLIENT_SECRET into AWS Secrets Manager
        shell: bash
        env:
          SECRET_NAME: "diy/ci/submit/hmrc/client_secret"
        run: |
          set -euo pipefail
          if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" >/dev/null 2>&1; then
            aws secretsmanager put-secret-value \
              --secret-id "$SECRET_NAME" \
              --secret-string file://secret.txt
          else
            aws secretsmanager create-secret \
              --name "$SECRET_NAME" \
              --secret-string file://secret.txt \
              --tags Key=managed-by,Value=github-actions Key=repo,Value=${GITHUB_REPOSITORY}
          fi
          shred -u secret.txt

      - name: Write GitHub secret DIY_SUBMIT_GOOGLE_CLIENT_SECRET to temp file (keeps out of logs)
        shell: bash
        env:
          GH_SECRET: ${{ secrets.DIY_SUBMIT_GOOGLE_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          umask 077
          printf '%s' "$GH_SECRET" > secret.txt
          echo "::add-mask::$(cat secret.txt)"

      - name: Upsert DIY_SUBMIT_GOOGLE_CLIENT_SECRET into AWS Secrets Manager
        shell: bash
        env:
          SECRET_NAME: "diy/ci/submit/google/client_secret"
        run: |
          set -euo pipefail
          if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" >/dev/null 2>&1; then
            aws secretsmanager put-secret-value \
              --secret-id "$SECRET_NAME" \
              --secret-string file://secret.txt
          else
            aws secretsmanager create-secret \
              --name "$SECRET_NAME" \
              --secret-string file://secret.txt \
              --tags Key=managed-by,Value=github-actions Key=repo,Value=${GITHUB_REPOSITORY}
          fi
          shred -u secret.txt

  deploy:
    needs:
      - build-base-image
      - upsert-secrets
      - provision-runner # added
    name: 'deploy'
    runs-on: ${{ fromJSON(env.runsOn) }} # changed
    environment: 'ci'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm install

      - name: Configure AWS Credentials
        if: ${{ env.skipDeploy != 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::887764105431:role/submit-github-actions-role
          role-chaining: false
          aws-region: eu-west-2
          audience: sts.amazonaws.com
          role-skip-session-tagging: true
          output-credentials: true
          retry-max-attempts: 3

      - name: Configure AWS Credentials
        if: ${{ env.skipDeploy != 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::887764105431:role/submit-deployment-role
          role-chaining: true
          aws-region: eu-west-2
          audience: sts.amazonaws.com
          role-skip-session-tagging: true
          output-credentials: true
          retry-max-attempts: 3

      - uses: actions/setup-java@v4
        if: ${{ env.skipDeploy != 'true' }}
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'maven'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Load base image from cache
        run: |
          BASE_IMAGE_TAG="${{ needs.build-base-image.outputs.base-image-tag }}"
          echo "Using base image: $BASE_IMAGE_TAG"
          
          # Load base image from GitHub Actions cache efficiently
          docker buildx build \
            --load \
            --cache-from type=gha,scope=base-${{ github.sha }} \
            --cache-from type=gha,scope=base-main \
            --cache-from type=gha,scope=base \
            -t $BASE_IMAGE_TAG \
            -f Dockerfile . || echo "Using fallback build if cache unavailable"

      #- name: package
      #  id: package
      #  shell: bash
      #  run: ./mvnw clean package -DskipTests=true
      #  env:
      #    BASE_IMAGE_TAG: ${{ needs.build-base-image.outputs.base-image-tag }}

      - name: Package Java classes for CDK
        id: package
        if: ${{ env.skipDeploy != 'true' }}
        shell: bash
        run: |
          ./mvnw package -Dmaven.compiler.source=17 -Dmaven.compiler.target=17 -DskipTests=true
        env:
          BASE_IMAGE_TAG: ${{ needs.build-base-image.outputs.base-image-tag }}

      - name: Log built files
        if: ${{ env.skipDeploy != 'true' }}
        shell: bash
        run: |
          echo "ls -lh target/:"
          ls -lh target/
          echo "du -h target/:"
          du -h target/

      - name: set-jar-path
        if: ${{ env.skipDeploy != 'true' }}
        id: jar-path
        shell: bash
        run: |
          jarPath=$(mvn help:evaluate --quiet --define expression=project.build.directory --define forceStdout)
          jarFilename=$(mvn help:evaluate --quiet --define expression=project.build.finalName --define forceStdout)
          echo "jarFilepath=${jarPath?}/${jarFilename?}.jar" | tee -a "${GITHUB_OUTPUT?}"

      - name: stacks
        if: ${{ env.skipDeploy != 'true' }}
        id: stacks
        shell: bash
        run: |
          deploy=$(jq -r '.deployStacks' cdk.json | sed 's/SubmitWebStack-dev
