<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; }
    </style>
  </defs>

  <!-- Page background -->
  <rect width="800" height="400" fill="#f9f9f9"/>

  <!-- ===== HEADER ===== -->
  <!-- Home icon (house) -->
  <path d="M28 32 L38 24 L48 32 L48 42 L42 42 L42 36 L34 36 L34 42 L28 42 Z" fill="#2c5aa0"/>
  <!-- Info icon -->
  <circle cx="66" cy="33" r="10" fill="none" stroke="#2c5aa0" stroke-width="1.5"/>
  <text x="66" y="37" fill="#2c5aa0" font-size="13" font-weight="bold" text-anchor="middle">i</text>

  <!-- Auth section -->
  <text x="772" y="30" fill="#666" font-size="12" text-anchor="end">antony@example.co.uk</text>
  <text x="772" y="46" fill="#666" font-size="12" text-anchor="end">97 tokens</text>

  <!-- h1 -->
  <text x="400" y="82" fill="#2c5aa0" font-size="26" font-weight="bold" text-anchor="middle">DIY Accounting Submit</text>
  <text x="400" y="104" fill="#666" font-size="13" text-anchor="middle">Submit UK VAT returns to HMRC under Making Tax Digital (MTD)</text>

  <!-- ===== NAV BAR ===== -->
  <line x1="60" y1="120" x2="740" y2="120" stroke="#ddd" stroke-width="1"/>
  <rect x="195" y="128" width="90" height="30" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="240" y="148" fill="#333" font-size="13" font-weight="bold" text-anchor="middle">Activities</text>
  <rect x="300" y="128" width="80" height="30" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="340" y="148" fill="#2c5aa0" font-size="13" text-anchor="middle">Receipts</text>
  <rect x="395" y="128" width="80" height="30" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="148" fill="#2c5aa0" font-size="13" text-anchor="middle">Bundles</text>
  <rect x="490" y="128" width="110" height="30" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="545" y="148" fill="#2c5aa0" font-size="13" text-anchor="middle">Spreadsheets</text>
  <line x1="60" y1="166" x2="740" y2="166" stroke="#ddd" stroke-width="1"/>

  <!-- ===== SUCCESS BANNER ===== -->
  <rect x="60" y="186" width="680" height="50" fill="#d4edda" rx="6" stroke="#c3e6cb" stroke-width="1"/>
  <text x="86" y="210" fill="#155724" font-size="14" font-weight="bold">Your VAT return was submitted successfully</text>
  <text x="86" y="228" fill="#155724" font-size="11">HMRC receipt: 8904567890 · Period: 01 Jan — 31 Mar 2026</text>

  <!-- ===== REFERRAL PROMPT CARD ===== -->
  <rect x="60" y="252" width="680" height="128" fill="#fff" rx="6" stroke="#bee5eb" stroke-width="1.5"/>

  <!-- Card content -->
  <text x="86" y="282" fill="#333" font-size="16" font-weight="bold">Know someone who'd find this useful?</text>
  <text x="86" y="306" fill="#666" font-size="13">Share an invitation — they get a full month of VAT submission access.</text>
  <text x="86" y="326" fill="#666" font-size="13">You earn 2 tokens when they redeem it.</text>

  <!-- CTA button -->
  <rect x="86" y="344" width="200" height="24" fill="#2c5aa0" rx="4"/>
  <text x="186" y="361" fill="white" font-size="12" font-weight="600" text-anchor="middle">Share an Invitation</text>

  <!-- Dismiss -->
  <text x="306" y="361" fill="#888" font-size="12">Maybe later</text>
</svg>
