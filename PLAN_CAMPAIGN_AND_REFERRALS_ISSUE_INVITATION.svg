<svg xmlns="http://www.w3.org/2000/svg" width="720" height="680" viewBox="0 0 720 680">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="680" fill="#f5f5f5" rx="8"/>

  <!-- Header bar -->
  <rect width="720" height="56" fill="#1a3a5c" rx="8"/>
  <rect y="20" width="720" height="36" fill="#1a3a5c"/>
  <text x="24" y="36" fill="white" font-size="18" font-weight="bold">DIY Accounting Submit</text>
  <text x="540" y="36" fill="#aac4e0" font-size="13">antony@example.co.uk</text>

  <!-- Nav -->
  <rect y="56" width="720" height="36" fill="#245080"/>
  <text x="24" y="79" fill="#aac4e0" font-size="13">Activities</text>
  <text x="120" y="79" fill="#aac4e0" font-size="13">Receipts</text>
  <text x="200" y="79" fill="white" font-size="13" font-weight="bold" text-decoration="underline">Bundles</text>
  <text x="280" y="79" fill="#aac4e0" font-size="13">Spreadsheets</text>

  <!-- Section title -->
  <text x="40" y="124" fill="#1a1a2e" font-size="20" font-weight="bold">Issue an Invitation</text>

  <!-- Card -->
  <rect x="30" y="138" width="660" height="520" fill="white" rx="6" stroke="#dee2e6" stroke-width="1"/>

  <!-- Description -->
  <text x="50" y="170" fill="#555" font-size="14">Share a free month of VAT submission access. Your guest gets full</text>
  <text x="50" y="188" fill="#555" font-size="14">invited-guest access — they just need to redeem within 3 days.</text>

  <!-- Free passes counter -->
  <rect x="50" y="208" width="360" height="40" fill="#e8f4e8" rx="4"/>
  <text x="66" y="234" fill="#2d6a2d" font-size="14" font-weight="600">2 of 3 free invitations remaining this month</text>

  <!-- Additional cost note -->
  <text x="430" y="234" fill="#888" font-size="12">Additional invitations cost 3 tokens</text>

  <!-- Notes input -->
  <text x="50" y="274" fill="#333" font-size="13" font-weight="600">Notes (optional)</text>
  <rect x="50" y="282" width="400" height="36" fill="white" rx="4" stroke="#ccc" stroke-width="1"/>
  <text x="62" y="306" fill="#aaa" font-size="13">e.g. For my friend Sarah</text>

  <!-- Issue button -->
  <rect x="50" y="332" width="180" height="40" fill="#2c5aa0" rx="4"/>
  <text x="96" y="358" fill="white" font-size="14" font-weight="600">Issue Invitation</text>

  <!-- Divider -->
  <line x1="50" y1="392" x2="670" y2="392" stroke="#ddd" stroke-width="1"/>

  <!-- Result section -->
  <text x="50" y="420" fill="#1a1a2e" font-size="16" font-weight="bold">Your Invitation Pass</text>

  <!-- Pass code -->
  <text x="50" y="452" fill="#2c5aa0" font-size="22" font-weight="bold">tiger-happy-mountain-silver</text>

  <!-- URL -->
  <text x="50" y="476" fill="#666" font-size="12">https://submit.diyaccounting.co.uk/bundles.html?pass=tiger-happy-mountain-silver</text>

  <!-- QR code placeholder -->
  <rect x="50" y="494" width="120" height="120" fill="#f0f0f0" rx="4" stroke="#ddd" stroke-width="1"/>
  <text x="78" y="550" fill="#999" font-size="11">QR Code</text>
  <text x="83" y="566" fill="#999" font-size="11">120×120</text>

  <!-- Buttons row -->
  <rect x="190" y="504" width="90" height="32" fill="#6c757d" rx="4"/>
  <text x="208" y="525" fill="white" font-size="12">Copy Link</text>

  <rect x="290" y="504" width="82" height="32" fill="#495057" rx="4"/>
  <text x="305" y="525" fill="white" font-size="12">View QR</text>

  <rect x="382" y="504" width="92" height="32" fill="#6c757d" rx="4"/>
  <text x="396" y="525" fill="white" font-size="12">Copy Code</text>

  <!-- Expiry info -->
  <rect x="190" y="550" width="340" height="30" fill="#fff3cd" rx="4"/>
  <text x="206" y="570" fill="#856404" font-size="12">Expires 19 March 2026 · 1 use · Grants: invited-guest (1 month)</text>

  <!-- Tokens consumed -->
  <text x="190" y="608" fill="#555" font-size="13">0 tokens consumed (free invitation). 97 tokens remaining.</text>

  <!-- Success badge -->
  <rect x="50" y="630" width="620" height="28" fill="#d4edda" rx="4"/>
  <text x="280" y="649" fill="#155724" font-size="13" font-weight="600" text-anchor="middle">Invitation issued successfully!</text>
</svg>
