<svg xmlns="http://www.w3.org/2000/svg" width="800" height="740" viewBox="0 0 800 740">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; }
    </style>
  </defs>

  <!-- Page background -->
  <rect width="800" height="740" fill="#f9f9f9"/>

  <!-- ===== HEADER ===== -->
  <!-- Home icon (house) -->
  <path d="M28 32 L38 24 L48 32 L48 42 L42 42 L42 36 L34 36 L34 42 L28 42 Z" fill="#2c5aa0"/>
  <!-- Info icon (circle-i) -->
  <circle cx="66" cy="33" r="10" fill="none" stroke="#2c5aa0" stroke-width="1.5"/>
  <text x="66" y="37" fill="#2c5aa0" font-size="13" font-weight="bold" text-anchor="middle">i</text>

  <!-- Auth section (right-aligned) -->
  <text x="772" y="30" fill="#666" font-size="12" text-anchor="end">antony@example.co.uk</text>
  <text x="772" y="46" fill="#666" font-size="12" text-anchor="end">97 tokens</text>

  <!-- h1 title -->
  <text x="400" y="82" fill="#2c5aa0" font-size="26" font-weight="bold" text-anchor="middle">DIY Accounting Submit</text>
  <!-- Subtitle -->
  <text x="400" y="104" fill="#666" font-size="13" text-anchor="middle">Submit UK VAT returns to HMRC under Making Tax Digital (MTD)</text>

  <!-- ===== NAV BAR ===== -->
  <line x1="60" y1="120" x2="740" y2="120" stroke="#ddd" stroke-width="1"/>
  <!-- Nav links with rounded borders -->
  <rect x="195" y="128" width="90" height="30" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="240" y="148" fill="#2c5aa0" font-size="13" text-anchor="middle">Activities</text>
  <rect x="300" y="128" width="80" height="30" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="340" y="148" fill="#2c5aa0" font-size="13" text-anchor="middle">Receipts</text>
  <rect x="395" y="128" width="80" height="30" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="148" fill="#333" font-size="13" font-weight="bold" text-anchor="middle">Bundles</text>
  <rect x="490" y="128" width="110" height="30" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="545" y="148" fill="#2c5aa0" font-size="13" text-anchor="middle">Spreadsheets</text>
  <line x1="60" y1="166" x2="740" y2="166" stroke="#ddd" stroke-width="1"/>

  <!-- ===== SECTION: Issue an Invitation ===== -->
  <line x1="60" y1="195" x2="740" y2="195" stroke="#ddd" stroke-width="1"/>

  <text x="400" y="232" fill="#333" font-size="19" font-weight="bold" text-anchor="middle">Issue an Invitation</text>
  <text x="400" y="258" fill="#666" font-size="13" text-anchor="middle">Share a month of VAT submission access. Your guest gets full invited-guest</text>
  <text x="400" y="276" fill="#666" font-size="13" text-anchor="middle">access — they just need to redeem within 3 days.</text>

  <!-- Token cost info banner -->
  <rect x="230" y="294" width="340" height="32" fill="#d1ecf1" rx="4"/>
  <text x="400" y="315" fill="#0c5460" font-size="13" text-anchor="middle">Each invitation uses 3 of your 97 tokens</text>

  <!-- Notes input -->
  <text x="180" y="358" fill="#333" font-size="13" font-weight="600">Notes (optional)</text>
  <rect x="180" y="366" width="340" height="34" fill="#fff" rx="4" stroke="#ccc" stroke-width="1"/>
  <text x="192" y="388" fill="#aaa" font-size="13">e.g. For my friend Sarah</text>

  <!-- Issue button -->
  <rect x="180" y="416" width="180" height="40" fill="#2c5aa0" rx="4"/>
  <text x="270" y="441" fill="white" font-size="14" font-weight="600" text-anchor="middle">Issue Invitation</text>

  <!-- ===== RESULT (after issuing) ===== -->
  <line x1="120" y1="480" x2="680" y2="480" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="512" fill="#333" font-size="16" font-weight="bold" text-anchor="middle">Your Invitation</text>

  <!-- Pass code -->
  <text x="400" y="546" fill="#2c5aa0" font-size="20" font-weight="bold" text-anchor="middle">tiger-happy-mountain-silver</text>

  <!-- URL -->
  <text x="400" y="570" fill="#666" font-size="11" text-anchor="middle">https://submit.diyaccounting.co.uk/bundles.html?pass=tiger-happy-mountain-silver</text>

  <!-- QR code placeholder -->
  <rect x="180" y="588" width="100" height="100" fill="#f0f0f0" rx="4" stroke="#ddd" stroke-width="1"/>
  <text x="230" y="636" fill="#999" font-size="11" text-anchor="middle">QR Code</text>
  <text x="230" y="652" fill="#999" font-size="10" text-anchor="middle">100 x 100</text>

  <!-- Action buttons -->
  <rect x="300" y="596" width="90" height="30" fill="#2c5aa0" rx="4"/>
  <text x="345" y="616" fill="white" font-size="11" text-anchor="middle">Copy Link</text>
  <rect x="400" y="596" width="90" height="30" fill="#2c5aa0" rx="4"/>
  <text x="445" y="616" fill="white" font-size="11" text-anchor="middle">View QR</text>
  <rect x="500" y="596" width="90" height="30" fill="#2c5aa0" rx="4"/>
  <text x="545" y="616" fill="white" font-size="11" text-anchor="middle">Copy Code</text>

  <!-- Expiry info -->
  <rect x="300" y="640" width="310" height="28" fill="#fff3cd" rx="4"/>
  <text x="455" y="659" fill="#856404" font-size="11" text-anchor="middle">Expires 19 March 2026 · 1 use · Grants: invited-guest (1 month)</text>

  <!-- Tokens consumed -->
  <text x="400" y="694" fill="#666" font-size="12" text-anchor="middle">3 tokens consumed. 94 tokens remaining.</text>

  <!-- Success banner -->
  <rect x="180" y="710" width="440" height="24" fill="#d4edda" rx="4"/>
  <text x="400" y="727" fill="#155724" font-size="12" font-weight="600" text-anchor="middle">Invitation issued successfully!</text>
</svg>
