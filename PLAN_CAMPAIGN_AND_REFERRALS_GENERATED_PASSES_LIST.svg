<svg xmlns="http://www.w3.org/2000/svg" width="800" height="620" viewBox="0 0 800 620">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; }
    </style>
  </defs>

  <!-- Page background -->
  <rect width="800" height="620" fill="#f9f9f9"/>

  <!-- ===== HEADER ===== -->
  <path d="M28 32 L38 24 L48 32 L48 42 L42 42 L42 36 L34 36 L34 42 L28 42 Z" fill="#2c5aa0"/>
  <circle cx="66" cy="33" r="10" fill="none" stroke="#2c5aa0" stroke-width="1.5"/>
  <text x="66" y="37" fill="#2c5aa0" font-size="13" font-weight="bold" text-anchor="middle">i</text>
  <text x="772" y="30" fill="#666" font-size="12" text-anchor="end">antony@example.co.uk</text>
  <text x="772" y="46" fill="#666" font-size="12" text-anchor="end">94 tokens</text>

  <!-- h1 -->
  <text x="400" y="82" fill="#2c5aa0" font-size="26" font-weight="bold" text-anchor="middle">DIY Accounting Submit</text>
  <text x="400" y="104" fill="#666" font-size="13" text-anchor="middle">Submit UK VAT returns to HMRC under Making Tax Digital (MTD)</text>

  <!-- ===== NAV BAR ===== -->
  <line x1="60" y1="120" x2="740" y2="120" stroke="#ddd" stroke-width="1"/>
  <rect x="195" y="128" width="90" height="30" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="240" y="148" fill="#2c5aa0" font-size="13" text-anchor="middle">Activities</text>
  <rect x="300" y="128" width="80" height="30" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="340" y="148" fill="#2c5aa0" font-size="13" text-anchor="middle">Receipts</text>
  <rect x="395" y="128" width="80" height="30" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="148" fill="#333" font-size="13" font-weight="bold" text-anchor="middle">Bundles</text>
  <rect x="490" y="128" width="110" height="30" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="545" y="148" fill="#2c5aa0" font-size="13" text-anchor="middle">Spreadsheets</text>
  <line x1="60" y1="166" x2="740" y2="166" stroke="#ddd" stroke-width="1"/>

  <!-- ===== SECTION: My Generated Passes ===== -->
  <line x1="60" y1="190" x2="740" y2="190" stroke="#ddd" stroke-width="1"/>

  <text x="400" y="224" fill="#333" font-size="19" font-weight="bold" text-anchor="middle">My Generated Passes</text>
  <text x="400" y="246" fill="#666" font-size="12" text-anchor="middle">Passes you have generated for others to use.</text>

  <!-- ===== Pass Card 1: Digital ===== -->
  <rect x="80" y="264" width="640" height="90" fill="#fff" rx="6" stroke="#ddd" stroke-width="1"/>
  <text x="100" y="290" fill="#2c5aa0" font-size="14" font-weight="600">tiger-happy-mountain-silver</text>
  <!-- Type badge -->
  <rect x="620" y="274" width="60" height="20" fill="#f3f2f1" rx="3"/>
  <text x="650" y="288" fill="#666" font-size="10" text-anchor="middle">Digital</text>
  <!-- Notes -->
  <text x="100" y="310" fill="#666" font-size="11" font-style="italic">February campaign for accountants meetup</text>
  <!-- Expiry + usage -->
  <text x="100" y="330" fill="#666" font-size="11">22 Mar 2026 · 3 of 20 uses</text>
  <!-- Buttons -->
  <rect x="100" y="338" width="70" height="22" fill="#2c5aa0" rx="3"/>
  <text x="135" y="353" fill="white" font-size="9" text-anchor="middle">Copy Link</text>
  <rect x="178" y="338" width="64" height="22" fill="#2c5aa0" rx="3"/>
  <text x="210" y="353" fill="white" font-size="9" text-anchor="middle">View QR</text>

  <!-- ===== Pass Card 2: Physical ===== -->
  <rect x="80" y="366" width="640" height="90" fill="#fff" rx="6" stroke="#ddd" stroke-width="1"/>
  <text x="100" y="392" fill="#2c5aa0" font-size="14" font-weight="600">ocean-bright-forest-cloud</text>
  <rect x="614" y="376" width="68" height="20" fill="#f3f2f1" rx="3"/>
  <text x="648" y="390" fill="#666" font-size="10" text-anchor="middle">Physical</text>
  <text x="100" y="412" fill="#666" font-size="11" font-style="italic">T-shirt for London Small Business Expo</text>
  <text x="100" y="432" fill="#666" font-size="11">No expiry · 0 of 10 uses</text>
  <rect x="100" y="440" width="70" height="22" fill="#2c5aa0" rx="3"/>
  <text x="135" y="455" fill="white" font-size="9" text-anchor="middle">Copy Link</text>
  <rect x="178" y="440" width="64" height="22" fill="#2c5aa0" rx="3"/>
  <text x="210" y="455" fill="white" font-size="9" text-anchor="middle">View QR</text>

  <!-- ===== Pass Card 3: Campaign/Invitation ===== -->
  <rect x="80" y="468" width="640" height="100" fill="#fff" rx="6" stroke="#ddd" stroke-width="1"/>
  <text x="100" y="494" fill="#2c5aa0" font-size="14" font-weight="600">river-golden-castle-dawn</text>
  <!-- Invitation badge (highlighted) -->
  <rect x="600" y="478" width="80" height="20" fill="#fff3cd" rx="3"/>
  <text x="640" y="492" fill="#856404" font-size="10" text-anchor="middle">Invitation</text>
  <text x="100" y="514" fill="#666" font-size="11" font-style="italic">For my friend Sarah — she runs a bakery</text>
  <text x="100" y="534" fill="#666" font-size="11">19 Mar 2026 · 0 of 1 uses</text>
  <text x="260" y="534" fill="#28a745" font-size="11">Active — awaiting redemption</text>
  <rect x="100" y="542" width="70" height="22" fill="#2c5aa0" rx="3"/>
  <text x="135" y="557" fill="white" font-size="9" text-anchor="middle">Copy Link</text>
  <rect x="178" y="542" width="64" height="22" fill="#2c5aa0" rx="3"/>
  <text x="210" y="557" fill="white" font-size="9" text-anchor="middle">View QR</text>

  <!-- Load more button -->
  <rect x="340" y="586" width="120" height="28" fill="#6c757d" rx="4"/>
  <text x="400" y="605" fill="white" font-size="11" text-anchor="middle">Load more</text>
</svg>
