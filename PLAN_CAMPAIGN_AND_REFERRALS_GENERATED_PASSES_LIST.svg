<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="520" fill="#f5f5f5" rx="8"/>

  <!-- Header bar -->
  <rect width="720" height="56" fill="#1a3a5c" rx="8"/>
  <rect y="20" width="720" height="36" fill="#1a3a5c"/>
  <text x="24" y="36" fill="white" font-size="18" font-weight="bold">DIY Accounting Submit</text>
  <text x="540" y="36" fill="#aac4e0" font-size="13">antony@example.co.uk</text>

  <!-- Nav -->
  <rect y="56" width="720" height="36" fill="#245080"/>
  <text x="200" y="79" fill="white" font-size="13" font-weight="bold" text-decoration="underline">Bundles</text>

  <!-- Section title -->
  <text x="40" y="124" fill="#1a1a2e" font-size="20" font-weight="bold">My Generated Passes</text>

  <!-- Card 1 - Digital with notes -->
  <rect x="30" y="140" width="660" height="110" fill="white" rx="6" stroke="#dee2e6" stroke-width="1"/>
  <text x="50" y="168" fill="#2c5aa0" font-size="15" font-weight="600">tiger-happy-mountain-silver</text>
  <rect x="560" y="150" width="60" height="22" fill="#e9ecef" rx="3"/>
  <text x="573" y="166" fill="#6c757d" font-size="11">Digital</text>
  <!-- Notes -->
  <text x="50" y="190" fill="#555" font-size="12" font-style="italic">February campaign for accountants meetup</text>
  <!-- Expiry + usage -->
  <text x="50" y="210" fill="#666" font-size="12">22 Mar 2026 · 3 of 20 uses</text>
  <!-- Buttons -->
  <rect x="50" y="222" width="76" height="24" fill="#6c757d" rx="3"/>
  <text x="63" y="238" fill="white" font-size="10">Copy Link</text>
  <rect x="134" y="222" width="66" height="24" fill="#495057" rx="3"/>
  <text x="146" y="238" fill="white" font-size="10">View QR</text>

  <!-- Card 2 - Physical with notes -->
  <rect x="30" y="262" width="660" height="110" fill="white" rx="6" stroke="#dee2e6" stroke-width="1"/>
  <text x="50" y="290" fill="#2c5aa0" font-size="15" font-weight="600">ocean-bright-forest-cloud</text>
  <rect x="554" y="272" width="68" height="22" fill="#e9ecef" rx="3"/>
  <text x="564" y="288" fill="#6c757d" font-size="11">Physical</text>
  <!-- Notes -->
  <text x="50" y="312" fill="#555" font-size="12" font-style="italic">T-shirt for London Small Business Expo</text>
  <!-- Expiry + usage -->
  <text x="50" y="332" fill="#666" font-size="12">No expiry · 0 of 10 uses</text>
  <!-- Buttons -->
  <rect x="50" y="344" width="76" height="24" fill="#6c757d" rx="3"/>
  <text x="63" y="360" fill="white" font-size="10">Copy Link</text>
  <rect x="134" y="344" width="66" height="24" fill="#495057" rx="3"/>
  <text x="146" y="360" fill="white" font-size="10">View QR</text>

  <!-- Card 3 - Campaign pass (new type) -->
  <rect x="30" y="384" width="660" height="110" fill="white" rx="6" stroke="#dee2e6" stroke-width="1"/>
  <text x="50" y="412" fill="#2c5aa0" font-size="15" font-weight="600">river-golden-castle-dawn</text>
  <rect x="540" y="394" width="80" height="22" fill="#fff3cd" rx="3"/>
  <text x="550" y="410" fill="#856404" font-size="11">Invitation</text>
  <!-- Notes -->
  <text x="50" y="434" fill="#555" font-size="12" font-style="italic">For my friend Sarah — she runs a bakery</text>
  <!-- Expiry + usage -->
  <text x="50" y="454" fill="#666" font-size="12">19 Mar 2026 · 0 of 1 uses</text>
  <!-- Redeemed status -->
  <text x="240" y="454" fill="#28a745" font-size="12">&#x2022; Active — awaiting redemption</text>
  <!-- Buttons -->
  <rect x="50" y="466" width="76" height="24" fill="#6c757d" rx="3"/>
  <text x="63" y="482" fill="white" font-size="10">Copy Link</text>
  <rect x="134" y="466" width="66" height="24" fill="#495057" rx="3"/>
  <text x="146" y="482" fill="white" font-size="10">View QR</text>
</svg>
