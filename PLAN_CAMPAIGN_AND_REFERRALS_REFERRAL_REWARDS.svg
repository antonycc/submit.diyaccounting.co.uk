<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; }
    </style>
  </defs>

  <!-- Page background -->
  <rect width="800" height="420" fill="#f9f9f9"/>

  <!-- ===== HEADER ===== -->
  <path d="M28 32 L38 24 L48 32 L48 42 L42 42 L42 36 L34 36 L34 42 L28 42 Z" fill="#2c5aa0"/>
  <circle cx="66" cy="33" r="10" fill="none" stroke="#2c5aa0" stroke-width="1.5"/>
  <text x="66" y="37" fill="#2c5aa0" font-size="13" font-weight="bold" text-anchor="middle">i</text>
  <text x="772" y="30" fill="#666" font-size="12" text-anchor="end">antony@example.co.uk</text>
  <text x="772" y="46" fill="#666" font-size="12" text-anchor="end">99 tokens</text>

  <!-- h1 -->
  <text x="400" y="82" fill="#2c5aa0" font-size="26" font-weight="bold" text-anchor="middle">DIY Accounting Submit</text>
  <text x="400" y="104" fill="#666" font-size="13" text-anchor="middle">Submit UK VAT returns to HMRC under Making Tax Digital (MTD)</text>

  <!-- ===== NAV BAR ===== -->
  <line x1="60" y1="120" x2="740" y2="120" stroke="#ddd" stroke-width="1"/>
  <rect x="195" y="128" width="90" height="30" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="240" y="148" fill="#2c5aa0" font-size="13" text-anchor="middle">Activities</text>
  <rect x="300" y="128" width="80" height="30" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="340" y="148" fill="#2c5aa0" font-size="13" text-anchor="middle">Receipts</text>
  <rect x="395" y="128" width="80" height="30" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="148" fill="#333" font-size="13" font-weight="bold" text-anchor="middle">Bundles</text>
  <rect x="490" y="128" width="110" height="30" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="545" y="148" fill="#2c5aa0" font-size="13" text-anchor="middle">Spreadsheets</text>
  <line x1="60" y1="166" x2="740" y2="166" stroke="#ddd" stroke-width="1"/>

  <!-- ===== TOKEN REWARD NOTIFICATION ===== -->
  <!-- Phase A: no dashboard UI. This shows the token reward notification
       that appears on the bundles page when a referral redeems an invitation. -->
  <rect x="60" y="186" width="680" height="44" fill="#d4edda" rx="6" stroke="#c3e6cb" stroke-width="1"/>
  <text x="86" y="213" fill="#155724" font-size="13" font-weight="600">+2 tokens earned! Someone redeemed your invitation tiger-happy-mountain-silver</text>

  <!-- ===== SECTION: My Generated Passes (showing redeemed pass) ===== -->
  <line x1="60" y1="250" x2="740" y2="250" stroke="#ddd" stroke-width="1"/>

  <text x="400" y="280" fill="#333" font-size="19" font-weight="bold" text-anchor="middle">My Generated Passes</text>
  <text x="400" y="300" fill="#666" font-size="12" text-anchor="middle">Passes you have generated for others to use.</text>

  <!-- Pass card showing redeemed invitation -->
  <rect x="80" y="316" width="640" height="86" fill="#fff" rx="6" stroke="#ddd" stroke-width="1"/>
  <text x="100" y="342" fill="#2c5aa0" font-size="14" font-weight="600">tiger-happy-mountain-silver</text>
  <!-- Invitation badge -->
  <rect x="600" y="326" width="80" height="20" fill="#fff3cd" rx="3"/>
  <text x="640" y="340" fill="#856404" font-size="10" text-anchor="middle">Invitation</text>
  <text x="100" y="362" fill="#666" font-size="11" font-style="italic">For my colleague Dave</text>
  <text x="100" y="382" fill="#666" font-size="11">19 Mar 2026 · 1 of 1 uses</text>
  <!-- Redeemed status -->
  <text x="260" y="382" fill="#28a745" font-size="11">Redeemed · +2 tokens earned</text>
</svg>
